            border: none;

            color: white;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder {
            color: #9ca3af;
        }

            border-radius: 50px;
            padding: 8px 22px;
            color: white;
            font-weight: bold;
            cursor: pointer;

        }
        .search-box button:hover {
            background: #3b82f6;
        }

            position: relative;

            transform: translateY(-6px);
            box-shadow: 0 25px 40px -8px #3b82f6, 0 0 0 1px #3b82f680;
        }

            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }
        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;

            transform: scale(1.04);
        }

            justify-content: center;

            color: white;
            margin-left: 4px;

        // window.location.href = FULLSCREEN_AD_URL;
        
        // কিন্তু নির্দেশনা অনুযায়ী "অটো রিডাইরেক্ট কোন জায়গায় ক্লিক করা ছাড়া ফুল স্কিন ডাইরেক্ট লিংকের ভিতর নিয়ে যাবে"
        // সুতরাং উইন্ডো লোকেশন পরিবর্তন করাই সঠিক (পুরো পেজ রিডাইরেক্ট)
        window.location.href = FULLSCREEN_AD_URL;
    }
    
    // কাউন্টডাউন টাইমার দেখানোর জন্য UI (শুধু ইউজারকে জানানোর জন্য)
    let countdownSeconds = 8;
    const countdownElement = document.getElementById('countdownDisplay');
    if (countdownElement) {
        countdownElement.innerText = `🎬 ফুলস্ক্রিন এড শুরু হবে: ${countdownSeconds} সেকেন্ডে`;
        const timerInterval = setInterval(() => {
            if (redirectExecuted) {
                clearInterval(timerInterval);
                return;
            }
            countdownSeconds--;
            if (countdownSeconds >= 0) {
                if (countdownElement) countdownElement.innerText = `🎬 ফুলস্ক্রিন এড শুরু হবে: ${countdownSeconds} সেকেন্ডে`;
                if (countdownSeconds === 0) {
                    clearInterval(timerInterval);
                }
            } else {
                clearInterval(timerInterval);
            }
        }, 1000);
    }
    
    // ৮ সেকেন্ড পর অটো রিডাইরেক্ট (কোনো প্রম্পট ছাড়া সরাসরি)
    setTimeout(() => {
        autoRedirectToFullscreenAd();
    }, 8000);  // Exactly 8 seconds

    // ========== পেজিনেশন ও থাম্বনেল ব্যবস্থাপনা ==========
    let currentPage = 1;
    let searchQuery = "";
    const ITEMS_PER_PAGE = 8;
    
    function getFilteredVideos() {
        if (!searchQuery.trim()) return VIDEO_DATA;
        return VIDEO_DATA.filter(v => v.title.toLowerCase().includes(searchQuery.toLowerCase()));
    }
    
    function getTotalPages() {
        return Math.ceil(getFilteredVideos().length / ITEMS_PER_PAGE);
    }
    
    function getCurrentPageVideos() {
        const filtered = getFilteredVideos();
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        return filtered.slice(start, start + ITEMS_PER_PAGE);
    }
    
    // পেজিনেশন নাম্বার ক্লিক করলে আলাদা লিংক ওপেন হবে (পূর্বের নিয়ম)
    function openPaginationLink(pageNumber) {
        const link = PAGINATION_LINKS[pageNumber];
        if(link) {
            window.open(link, '_blank');
        } else {
            console.warn(`পেজ ${pageNumber} এর জন্য লিংক নেই`);
            alert(`পেজ ${pageNumber} - লিংক সংযুক্ত নয়`);
        }
    }
    
    // ভিডিও প্লে/ডাউনলোড হ্যান্ডলার (কোনো এড স্বয়ংক্রিয়ভাবে আসবে না, শুধু ৮ সেকেন্ড পরের অটো রিডাইরেক্ট)
    function handlePlay(videoUrl, title, event) {
        event.stopPropagation();
        if(confirm(`"${title}" ভিডিওটি প্লে করবেন?`)) {
            window.open(videoUrl, '_blank');
        }
    }
    
    function handleDownload(downloadUrl, title, event) {
        event.stopPropagation();
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = `${title.replace(/[^a-z0-9]/gi, '_')}.mp4`;
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
    
    function handleCardClick(video, event) {
        event.stopPropagation();
        if(confirm(`"${video.title}" ভিডিওটি প্লে করতে চান?`)) {
            window.open(video.videoUrl, '_blank');
        }
    }
    
    // থাম্বনেল রেন্ডার
    function renderThumbnails() {
        const grid = document.getElementById('thumbGrid');
        if (!grid) return;
        const pageVideos = getCurrentPageVideos();
        if (pageVideos.length === 0 && searchQuery) {
            grid.innerHTML = `<div style="color:white; text-align:center; grid-column:1/-1; padding:50px;">🔍 কোন ভিডিও পাওয়া যায়নি</div>`;
            return;
        }
        grid.innerHTML = '';
        pageVideos.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            
            const thumbWrap = document.createElement('div');
            thumbWrap.className = 'thumbnail-wrapper';
            const img = document.createElement('img');
            img.src = video.thumb;
            img.alt = video.title;
            img.className = 'thumbnail-img';
            img.loading = 'lazy';
            const iconDiv = document.createElement('div');
            iconDiv.className = 'video-icon';
            thumbWrap.appendChild(img);
            thumbWrap.appendChild(iconDiv);
            
            const serialBadge = document.createElement('div');
            serialBadge.className = 'serial-badge';
            serialBadge.innerText = `#${video.serial}`;
            thumbWrap.appendChild(serialBadge);
            
            const btnBar = document.createElement('div');
            btnBar.className = 'button-bar';
            const playBtn = document.createElement('button');
            playBtn.className = 'play-btn';
            playBtn.innerHTML = '▶ প্লে';
            const downBtn = document.createElement('button');
            downBtn.className = 'download-btn';
            downBtn.innerHTML = '⬇ ডাউনলোড';
            
            playBtn.addEventListener('click', (e) => handlePlay(video.videoUrl, video.title, e));
            downBtn.addEventListener('click', (e) => handleDownload(video.downloadUrl, video.title, e));
            card.addEventListener('click', (e) => handleCardClick(video, e));
            
            btnBar.appendChild(playBtn);
            btnBar.appendChild(downBtn);
            card.appendChild(thumbWrap);
            card.appendChild(btnBar);
            grid.appendChild(card);
        });
    }
    
    // পেজিনেশন রেন্ডার: 1-10 প্রতিটি আলাদা লিংক ওপেন করবে (ক্লিক করলেই)
    function renderPagination() {
        const container = document.getElementById('paginationWrapper');
        if (!container) return;
        const totalPages = getTotalPages();
        const maxVisible = 10;
        container.innerHTML = '';
        
        for (let i = 1; i <= maxVisible; i++) {
            const pageBtn = document.createElement('div');
            pageBtn.className = 'page-number';
            if (i === currentPage && i <= totalPages) {
                pageBtn.classList.add('active-page');
            }
            pageBtn.innerText = i;
            
            pageBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                // প্রথমে ইউনিক লিংক ওপেন হবে (প্রত্যেক নম্বরের জন্য আলাদা)
                openPaginationLink(i);
                // এরপর পেজ কন্টেন্ট পরিবর্তন (valid পেজ হলেই)
                if (i <= totalPages) {
                    currentPage = i;
                    renderThumbnails();
                    renderPagination();
                }
            });
            container.appendChild(pageBtn);
        }
    }
    
    // সার্চ ফাংশন (শুধু লিস্ট রিফ্রেশ)
    function performSearch() {
        const input = document.getElementById('searchInput');
        searchQuery = input.value.trim();
        currentPage = 1;
        renderThumbnails();
        renderPagination();
    }
    
    // টেলিগ্রাম বাটন
    function setupTelegram() {
        const tg = document.getElementById('telegramGlowBtn');
        if (tg) {
            tg.addEventListener('click', (e) => {
                e.preventDefault();
                window.open(TELEGRAM_URL, '_blank');
            });
        }
    }
    
    // সবকিছু লোড
    function init() {
        renderThumbnails();
        renderPagination();
        setupTelegram();
        
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        
        console.log("✅ গ্যালারি প্রস্তুত। ৮ সেকেন্ড পর অটোমেটিক ফুলস্ক্রিন এড রিডাইরেক্ট (কোনো ক্লিক ছাড়া)। পেজিনেশন নম্বরগুলোর আলাদা লিংক ঠিক আছে।");
    }
    
    init();
</script>
</body>
</html>
